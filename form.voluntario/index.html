<!DOCTYPE html>
<html lang="pr-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voluntário</title>
</head>
<body>

    <h1>Sou Voluntário</h1>
    <form action="Voluntario">
        <div class="nome"><input id="nome" type="text" name="Nome" placeholder="Seu nome completo"></div>

        <div class="telefone"><input id="telefone" type="number" name="Telefone" placeholder="Telefone" inputmode="numeric"></div>

        <div class="cpf"><input id="cpf" type="text" name="CPF" placeholder="CPF" inputmode="numeric"></div>

        <div class="linkedin"><input id="linkedin" type="text" name="linkedin" placeholder="Linkedin"></div>
        
        <div class="e-mail"><input id="e-mail" type="text" name="E-mail" placeholder="E-mail"></div>

        <div class="instagram"><input id="instagram" type="text" name="Instagram" placeholder="Instagram(opcional)"></div>

        <div class="nascimento"><input id="nascimento" type="date" name="nascimento" placeholder="dd/mm/aaaa"></div>

        <div calss="curriculo">
            <textarea name="curriculo" id="curriculo" rows="7" placeholder="Descreva brevemente a sua experiência profissional, que te capacite para atuar como voluntário"></textarea></div>
    </form>
</body>
</html>
